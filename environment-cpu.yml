name: vs_seg
# Portable CPU environment. This works on systems with AMD, Intel, NVIDIA,
# integrated graphics, or no supported GPU. Inference is slower than on a GPU.
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.8.0+cpu
      - torchvision==0.23.0+cpu
      - nnunetv2==2.8.1
      - SimpleITK
      - numpy
